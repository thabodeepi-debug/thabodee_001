<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA Meta Tags (สำหรับติดตั้งลงมือถือ) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TPJ Studio">
    <meta name="theme-color" content="#f8fafc">
    
    <title>TPJ Studio Mobile</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (สำหรับการแปลง JSX ในเบราว์เซอร์) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        /* Disable text selection for app-like feel */
        .no-select { -webkit-user-select: none; user-select: none; }
        /* Remove number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Icon Components ---
        const Icon = ({ path, className = "w-6 h-6", fill = "none" }) => (
            <svg viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const Home = (p) => <Icon {...p} path='<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>' />;
        const Package = (p) => <Icon {...p} path='<line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>' />;
        const ShoppingCart = (p) => <Icon {...p} path='<circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>' />;
        const Plus = (p) => <Icon {...p} path='<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>' />;
        const Minus = (p) => <Icon {...p} path='<line x1="5" y1="12" x2="19" y2="12"></line>' />;
        const Trash2 = (p) => <Icon {...p} path='<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>' />;
        const TrendingUp = (p) => <Icon {...p} path='<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline>' />;
        const AlertCircle = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>' />;
        const Sparkles = (p) => <Icon {...p} path='<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>' />;
        const Bot = (p) => <Icon {...p} path='<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>' />;
        const Loader2 = (p) => <Icon {...p} path='<path d="M21 12a9 9 0 1 1-6.219-8.56"/>' />;
        const X = (p) => <Icon {...p} path='<path d="M18 6 6 18"/><path d="m6 6 12 12"/>' />;
        const CopyIcon = (p) => <Icon {...p} path='<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>' />;
        const Check = (p) => <Icon {...p} path='<path d="M20 6 9 17l-5-5"/>' />;
        const SaveIcon = (p) => <Icon {...p} path='<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline>' />;

        // --- Main App Component ---
        function App() {
            // ข้อมูลสินค้า TPJ Studio อัปเดตราคาพรมยาวและผ้าห่อตัวล่าสุดตามแจ้ง
            const [products] = useState([
                { id: 1, category: "ผ้าขนหนู", name: "ผ้าเช็ดผม", cost: 55, price: 99 },
                { id: 2, category: "ผ้าขนหนู", name: "ผ้าเช็ดตัว", cost: 230, price: 390 },
                { id: 3, category: "ผ้าขนหนู", name: "ผ้าเช็ดมือ", cost: 40, price: 79 },
                { id: 4, category: "ผ้าขนหนู", name: "ผ้าเช็ดหน้า", cost: 20, price: 39 }, 
                { id: 5, category: "ผ้าห่มชิลกี้", name: "120*150 ซม. (เด็ก)", cost: 350, price: 590 },
                { id: 6, category: "ผ้าห่มชิลกี้", name: "150*200 ซม. (3.5 ฟุต)", cost: 500, price: 890 },
                { id: 7, category: "ผ้าห่มชิลกี้", name: "200*230 ซม. (5 หรือ 6 ฟุต)", cost: 550, price: 990 },
                { id: 8, category: "ชิลกี้พรีเมี่ยม", name: "4 ลาย 120*150 เด็ก", cost: 500, price: 890 },
                { id: 9, category: "ชิลกี้พรีเมี่ยม", name: "4 ลาย 150*200 (3.5 ฟุต)", cost: 650, price: 1190 },
                { id: 10, category: "ชิลกี้พรีเมี่ยม", name: "4 ลาย 200*230 (6 ฟุต)", cost: 700, price: 1290 },
                { id: 11, category: "ผ้าห่มเทนเซล (ลอตเซล)", name: "ผ้าห่มเทนเซล 150*200 ซม. (3.5 ฟุต)", cost: 500, price: 1000 },
                { id: 12, category: "ผ้าห่มเทนเซล (ลอตเซล)", name: "ผ้าห่มเทนเซล 200*230 ซม. (5 หรือ 6 ฟุต)", cost: 600, price: 1200 },
                { id: 13, category: "ผ้าห่มเทนเซล พรีเมี่ยม", name: "150*200 ซม. (3.5 ฟุต)", cost: 1100, price: 1990 },
                { id: 14, category: "ผ้าห่มเทนเซล พรีเมี่ยม", name: "200*230 ซม. (5 หรือ 6 ฟุต)", cost: 1300, price: 2390 },
                { id: 15, category: "เครื่องนอนเทนเซล", name: "ผ้าปู 6 ฟุต", cost: 900, price: 1690 },
                { id: 16, category: "เครื่องนอนเทนเซล", name: "ปลอกหมอน 2 ใบ", cost: 450, price: 890 },
                { id: 18, category: "เครื่องนอนเทนเซล", name: "ผ้าห่มเทนเซลเซ็ต (ผ้าห่ม+ปู+หมอน)", cost: 2650, price: 4290 },
                { id: 19, category: "ผ้าอ้อม/ผ้าห่อตัว", name: "ผ้าห่อตัว", cost: 150, price: 290 }, 
                { id: 20, category: "พรม", name: "พรมสั้น", cost: 55, price: 100 }, 
                { id: 21, category: "พรม", name: "พรมยาว", cost: 200, price: 390 }, 
                { id: 22, category: "หมอน", name: "หมอนถั่ว", cost: 500, price: 890 }
            ]);

            const LOCAL_STORAGE_KEY = 'tpj_mobile_app_data';

            const [activeTab, setActiveTab] = useState('home');

            const [inventory, setInventory] = useState(() => {
                const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (saved) {
                    try { return JSON.parse(saved); } catch (e) {}
                }
                return products.reduce((acc, curr) => ({
                    ...acc, [curr.id]: { stockIn: 0, sold: 0 }
                }), {});
            });

            const [aiModal, setAiModal] = useState({ isOpen: false, title: '', content: '', isLoading: false });
            const [isCopied, setIsCopied] = useState(false);

            useEffect(() => {
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(inventory));
            }, [inventory]);

            // --- Gemini API Logic ---
            const callGeminiAPI = async (promptText, sysPromptText, retryCount = 0) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                const apiKey = ""; 
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }],
                            systemInstruction: { parts: [{ text: sysPromptText }] }
                        })
                    });
                    if (!response.ok) throw new Error('API request failed');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (retryCount < 5) {
                        await new Promise(resolve => setTimeout(resolve, delays[retryCount]));
                        return callGeminiAPI(promptText, sysPromptText, retryCount + 1);
                    }
                    throw error;
                }
            };

            const generateSalesInsights = async () => {
                setAiModal({ isOpen: true, title: '✨ AI วิเคราะห์ยอดขาย', content: '', isLoading: true });
                const soldItems = products
                    .filter(p => inventory[p.id]?.sold > 0)
                    .map(p => `- ${p.name}: ขายได้ ${inventory[p.id].sold} ชิ้น (กำไร: ${(p.price - p.cost) * inventory[p.id].sold} บาท)`)
                    .join('\n');
                
                const prompt = `ข้อมูลสรุปการขายวันนี้ของร้าน TPJ Studio:\nยอดขายรวม: ${stats.totalRevenue} บาท\nยอดนำจ่ายร้านค้า (ต้นทุนรับเข้า): ${stats.totalCost} บาท\nกำไรสุทธิรวมที่ได้รับจริง: ${stats.totalProfit} บาท\nสินค้าที่ขายออกไปแล้ว:\n${soldItems || 'ยังไม่มีสินค้าขายออกในวันนี้'}\n\nคำสั่ง: โปรดวิเคราะห์ภาพรวมการขายสั้นๆ เป็นภาษาไทย และให้คำแนะนำหรือทริค 3 ข้อในการทำโปรโมชั่น/จัดเซ็ตสินค้าเพื่อเพิ่มยอดขายจากข้อมูลด้านบนนี้`;
                const sysPrompt = "คุณคือ AI ผู้ช่วยผู้จัดการร้านขายเครื่องนอนออนไลน์ สรุปข้อมูลให้กระชับ เป็นกันเอง อ่านง่ายบนมือถือ และให้คำแนะนำที่นำไปใช้ได้จริง";

                try {
                    const result = await callGeminiAPI(prompt, sysPrompt);
                    setAiModal(prev => ({ ...prev, content: result || 'ไม่สามารถสร้างข้อความได้', isLoading: false }));
                } catch (e) {
                    setAiModal(prev => ({ ...prev, content: '❌ เกิดข้อผิดพลาดในการเชื่อมต่อกับ AI (หากคุณรันไฟล์นี้นอกระบบจำลอง โปรดตรวจสอบ API Key)', isLoading: false }));
                }
            };

            const generateItemCaption = async (item) => {
                setAiModal({ isOpen: true, title: `✨ แคปชั่น: ${item.name}`, content: '', isLoading: true });
                setIsCopied(false);

                const prompt = `แต่งแคปชั่นขายสินค้าสำหรับโพสต์ลง Facebook หรือ TikTok\nชื่อสินค้า: ${item.name}\nหมวดหมู่: ${item.category}\nราคาขาย: ${item.price} บาท\n\nคำสั่ง: ขอแคปชั่นแบบน่ารัก เป็นกันเอง ดึงดูดลูกค้าให้อยากซื้อ ปิดการขายง่าย พร้อมมี Emoji ประกอบและใส่ Hashtag ที่เหมาะสม (เช่น #เครื่องนอน #TPJStudio)`;
                const sysPrompt = "คุณคือสุดยอดแม่ค้าออนไลน์ที่เขียนแคปชั่นเก่งมาก ใช้ภาษาชวนคุย อ่านสนุก และกระตุ้นให้อยาก CF สินค้าทันที";

                try {
                    const result = await callGeminiAPI(prompt, sysPrompt);
                    setAiModal(prev => ({ ...prev, content: result || 'ไม่สามารถสร้างข้อความได้', isLoading: false }));
                } catch (e) {
                    setAiModal(prev => ({ ...prev, content: '❌ เกิดข้อผิดพลาดในการเชื่อมต่อกับ AI (หากคุณรันไฟล์นี้นอกระบบจำลอง โปรดตรวจสอบ API Key)', isLoading: false }));
                }
            };

            const copyToClipboard = () => {
                const textArea = document.createElement("textarea");
                textArea.value = aiModal.content;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setIsCopied(true);
                    setTimeout(() => setIsCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy', err);
                }
                document.body.removeChild(textArea);
            };

            // --- ฟังก์ชันสต็อก ---
            const updateStock = (id, field, delta) => {
                const p = products.find(prod => prod.id === id);
                if (p && p.cost === null) return; 
                setInventory(prev => {
                    const currentVal = prev[id]?.[field] || 0;
                    const newVal = Math.max(0, currentVal + delta);
                    return { ...prev, [id]: { ...prev[id], [field]: newVal } };
                });
            };

            // ฟังก์ชันสำหรับพิมพ์ตัวเลขรับเข้า / ขายออก ได้เอง
            const setStockValue = (id, field, value) => {
                const p = products.find(prod => prod.id === id);
                if (p && p.cost === null) return;
                setInventory(prev => ({
                    ...prev,
                    [id]: { ...prev[id], [field]: Math.max(0, value) }
                }));
            };

            // ฟังก์ชันแมนนวลเซฟข้อมูล (Manual Save)
            const handleSaveData = () => {
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(inventory));
                alert("💾 บันทึกข้อมูลเรียบร้อยแล้ว!\nข้อมูลสต็อกล่าสุดถูกบันทึกในอุปกรณ์เครื่องนี้อย่างปลอดภัยแล้วครับ");
            };

            // ฟังก์ชันเคลียร์ข้อมูลทั้งหมดกลับเป็น 0 (Clear Data)
            const handleClearData = () => {
                if(window.confirm("⚠️ คุณต้องการล้างข้อมูล 'รับเข้า' และ 'ขายออก' ทั้งหมดให้กลับเป็น 0 ใช่หรือไม่?")) {
                    const reset = products.reduce((acc, curr) => ({ ...acc, [curr.id]: { stockIn: 0, sold: 0 } }), {});
                    setInventory(reset);
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(reset));
                }
            };

            const stats = useMemo(() => {
                let totalIn = 0, totalOut = 0, totalCostIn = 0, totalCOGS = 0, totalRevenue = 0, totalProfit = 0;
                products.forEach(p => {
                    const sIn = inventory[p.id]?.stockIn || 0;
                    const sOut = inventory[p.id]?.sold || 0;
                    totalIn += sIn;
                    totalOut += sOut;
                    if (p.cost !== null) {
                        totalCostIn += sIn * p.cost; 
                        totalCOGS += sOut * p.cost;  
                    }
                    if (p.price !== null) {
                        totalRevenue += sOut * p.price; 
                    }
                    if (p.price !== null && p.cost !== null) {
                        totalProfit += sOut * (p.price - p.cost); 
                    }
                });
                return { totalIn, totalOut, totalCostIn, totalCOGS, totalRevenue, totalProfit, remaining: totalIn - totalOut };
            }, [inventory, products]);

            const formatMoney = (val) => new Intl.NumberFormat('th-TH').format(val);

            // --- UI 1: Home ---
            const renderHome = () => (
                <div className="space-y-4 pb-20 animate-in fade-in duration-300">
                    {/* บัตรสรุปผลการเงิน 3 ส่วนตามที่กำหนด (Revenue, Cost, Profit) */}
                    <div className="flex flex-col gap-3">
                        <div className="bg-[#292524] rounded-2xl p-5 shadow-sm border border-[#3f3938]">
                            <p className="text-gray-400 text-sm font-medium mb-1">รวมยอดขายทั้งหมด (Revenue)</p>
                            <h2 className="text-3xl font-black text-white">฿{formatMoney(stats.totalRevenue)}</h2>
                        </div>
                        
                        <div className="bg-[#fff1f2] border border-rose-100 rounded-2xl p-5 shadow-sm">
                            <p className="text-[#e11d48] text-sm font-medium mb-1">รวมยอดต้นทุน (Total Cost)</p>
                            <h2 className="text-3xl font-black text-[#be123c]">฿{formatMoney(stats.totalCOGS)}</h2>
                        </div>
                        
                        <div className="bg-[#ecfdf5] border border-emerald-100 rounded-2xl p-5 shadow-sm">
                            <p className="text-[#047857] text-sm font-medium mb-1">รวมกำไรสุทธิ (Total Profit)</p>
                            <h2 className="text-3xl font-black text-[#065f46]">฿{formatMoney(stats.totalProfit)}</h2>
                        </div>
                    </div>

                    {/* ปุ่ม Save และ Clear */}
                    <div className="flex gap-3">
                        <button 
                            onClick={handleSaveData} 
                            className="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 p-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors active:scale-95 text-sm border border-blue-100 shadow-sm"
                        >
                            <SaveIcon className="w-4 h-4" /> บันทึกยอด
                        </button>
                        <button 
                            onClick={handleClearData} 
                            className="flex-1 bg-white hover:bg-rose-50 text-rose-600 p-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors active:scale-95 text-sm border border-rose-200 shadow-sm"
                        >
                            <Trash2 className="w-4 h-4" /> ล้างบิล
                        </button>
                    </div>

                    {/* ตารางแสดงการขาย */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mt-2">
                        <div className="p-4 bg-slate-50 border-b border-slate-100 font-bold text-slate-700 flex items-center gap-2">
                            <TrendingUp className="w-5 h-5 text-indigo-500" /> ตารางสรุปและกรอกยอดขายรายวัน (ชิ้น)
                        </div>
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-center whitespace-nowrap text-sm min-w-[600px]">
                                <thead>
                                    <tr className="bg-white border-b border-slate-100">
                                        <th className="py-3 px-3 font-semibold text-slate-600 text-left">รายการ</th>
                                        <th className="py-3 px-3 font-bold text-slate-800">กำไร/ชิ้น</th>
                                        <th className="py-3 px-3 font-bold text-[#1e3a8a] bg-[#eff6ff]">ขายออก (ชิ้น)</th>
                                        <th className="py-3 px-3 font-bold text-slate-800">รวมยอดขาย</th>
                                        <th className="py-3 px-3 font-bold text-[#e11d48]">ยอดต้นทุน</th>
                                        <th className="py-3 px-3 font-bold text-[#059669]">กำไรรวม</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {products.map(p => {
                                        if (p.price === null || p.cost === null) return null; 
                                        const sOut = inventory[p.id]?.sold || 0;
                                        const profitPerUnit = p.price - p.cost;
                                        const revenue = sOut * p.price;
                                        const cogs = sOut * p.cost;
                                        const profitTotal = sOut * profitPerUnit;

                                        return (
                                            <tr key={p.id} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="py-3 px-3 text-left">
                                                    <div className="font-medium text-slate-800">{p.name}</div>
                                                    <div className="text-[10px] text-slate-400">{p.category}</div>
                                                </td>
                                                <td className="py-3 px-3 font-medium text-emerald-600">฿{formatMoney(profitPerUnit)}</td>
                                                <td className="py-3 px-3 bg-[#eff6ff]/50">
                                                    <input 
                                                        type="number" 
                                                        min="0"
                                                        value={sOut === 0 ? "" : sOut} 
                                                        onChange={(e) => setStockValue(p.id, 'sold', e.target.value === '' ? 0 : parseInt(e.target.value, 10))}
                                                        onFocus={(e) => e.target.select()}
                                                        className="w-16 mx-auto text-center border border-slate-200 rounded-md py-1.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-blue-800 font-bold bg-white shadow-sm"
                                                        placeholder="0"
                                                    />
                                                </td>
                                                <td className="py-3 px-3 font-medium text-slate-800">฿{formatMoney(revenue)}</td>
                                                <td className="py-3 px-3 font-medium text-rose-600">฿{formatMoney(cogs)}</td>
                                                <td className="py-3 px-3 font-bold text-emerald-600">฿{formatMoney(profitTotal)}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    {/* ยอดต้นทุนรับเข้า */}
                    <div className="bg-slate-100 p-4 rounded-xl border border-slate-200 flex justify-between items-center text-sm mt-4">
                        <span className="text-slate-600 font-medium">รวมยอดสั่งของ (ต้นทุนรับเข้าทั้งหมด):</span>
                        <span className="font-bold text-slate-800">฿{formatMoney(stats.totalCostIn)}</span>
                    </div>

                    <button onClick={generateSalesInsights} className="w-full bg-gradient-to-r from-fuchsia-500 to-indigo-500 hover:from-fuchsia-600 hover:to-indigo-600 text-white p-4 rounded-2xl shadow-md flex items-center justify-center gap-3 transition-transform active:scale-95 no-select">
                        <Sparkles className="w-6 h-6 text-yellow-300" />
                        <span className="font-bold text-lg">ให้ AI วิเคราะห์ยอดขาย</span>
                    </button>
                </div>
            );

            // --- UI 2: Inventory ---
            const renderInventory = () => (
                <div className="pb-24 space-y-4 animate-in slide-in-from-right-4 duration-300">
                    <div className="sticky top-0 bg-slate-50 pt-2 pb-4 z-10 border-b border-slate-200">
                        <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                            <Package className="w-5 h-5 text-indigo-600" /> อัปเดตสต็อกสินค้า
                        </h2>
                        <p className="text-xs text-slate-500 mt-1">แตะปุ่ม + / - หรือแตะตัวเลขตรงกลางเพื่อแก้ไขได้เอง</p>
                    </div>

                    {products.map(p => {
                        const sIn = inventory[p.id]?.stockIn || 0;
                        const sOut = inventory[p.id]?.sold || 0;
                        const rem = sIn - sOut;
                        const totalCostValue = p.cost !== null ? sIn * p.cost : 0;
                        const totalRevenueValue = p.price !== null ? sOut * p.price : 0;
                        const totalProfitValue = (p.price !== null && p.cost !== null) ? sOut * (p.price - p.cost) : 0;
                        
                        return (
                            <div key={p.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-3 relative overflow-hidden">
                                {p.price !== null && (
                                    <button onClick={() => generateItemCaption(p)} className="absolute top-3 right-3 bg-fuchsia-50 text-fuchsia-600 hover:bg-fuchsia-100 p-2 rounded-full transition-colors active:scale-95 no-select" title="ให้ AI ช่วยแต่งแคปชั่น">
                                        <Sparkles className="w-4 h-4" />
                                    </button>
                                )}
                                <div className="flex justify-between items-start pr-10">
                                    <div>
                                        <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">{p.category}</span>
                                        <h3 className="font-bold text-slate-800 mt-1 text-sm">{p.name}</h3>
                                        <p className="text-xs text-slate-500 mt-0.5">
                                            {p.cost !== null ? (
                                                <>ต้นทุน ฿{p.cost} | ขาย ฿{p.price} | กำไร/ชิ้น <span className="text-emerald-600 font-bold">฿{p.price - p.cost}</span></>
                                            ) : (
                                                <span className="text-red-500 font-bold">❌ งดจำหน่ายชั่วคราว</span>
                                            )}
                                        </p>
                                    </div>
                                </div>

                                {/* แถบข้อมูลการเงินและคงเหลือของสินค้าเจาะลึก */}
                                <div className="grid grid-cols-2 gap-2 mt-1">
                                    <div className={`flex items-center justify-between p-2 rounded-xl border ${p.cost === null ? 'bg-slate-100/50 border-slate-200 text-slate-400' : rem < 0 ? 'bg-rose-50 border-rose-100' : rem > 0 ? 'bg-emerald-50 border-emerald-100' : 'bg-slate-50 border-slate-100'}`}>
                                        <span className="text-[11px] font-semibold text-slate-500">คงเหลือ</span>
                                        <span className={`text-base font-black ${p.cost === null ? 'text-slate-400' : rem < 0 ? 'text-rose-600' : rem > 0 ? 'text-emerald-600' : 'text-slate-600'}`}>{p.cost === null ? "-" : rem}</span>
                                    </div>
                                    <div className={`flex items-center justify-between p-2 rounded-xl border ${p.cost === null ? 'bg-slate-100/50 border-slate-200 text-slate-400' : 'bg-rose-50/20 border-rose-100'}`}>
                                        <span className="text-[11px] font-semibold text-rose-600">ยอดต้นทุน</span>
                                        <span className="text-base font-black text-rose-700">฿{formatMoney(totalCostValue)}</span>
                                    </div>
                                </div>

                                {/* แสดงสรุปยอดขาย และกำไรรวมของสินค้าชิ้นนี้รายชิ้น */}
                                {p.cost !== null && (sOut > 0) && (
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="flex items-center justify-between p-2 rounded-xl border bg-indigo-50/30 border-indigo-100 text-slate-600">
                                            <span className="text-[11px] font-semibold">รวมยอดขาย</span>
                                            <span className="text-xs font-bold">฿{formatMoney(totalRevenueValue)}</span>
                                        </div>
                                        <div className="flex items-center justify-between p-2 rounded-xl border bg-emerald-50/30 border-emerald-100 text-emerald-700">
                                            <span className="text-[11px] font-semibold">กำไรรวม</span>
                                            <span className="text-xs font-bold">฿{formatMoney(totalProfitValue)}</span>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-3 mt-1">
                                    {/* ควบคุม รับเข้า (พิมพ์ตัวเลขได้เอง) */}
                                    <div className={`bg-slate-50 p-2 rounded-xl border border-slate-100 ${p.cost === null ? 'opacity-40' : ''}`}>
                                        <p className="text-center text-[11px] text-slate-500 mb-1 font-semibold">📥 รับเข้า (สต็อก)</p>
                                        <div className="flex items-center justify-between bg-white rounded-lg p-1 border border-slate-200">
                                            <button disabled={p.cost === null} onClick={() => updateStock(p.id, 'stockIn', -1)} className="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-md text-slate-600 active:bg-slate-200 disabled:opacity-50"><Minus className="w-4 h-4" /></button>
                                            <input 
                                                type="number" 
                                                min="0"
                                                disabled={p.cost === null}
                                                value={p.cost === null ? "" : (sIn === 0 ? "" : sIn)} 
                                                onChange={(e) => setStockValue(p.id, 'stockIn', e.target.value === '' ? 0 : parseInt(e.target.value, 10))}
                                                onFocus={(e) => e.target.select()}
                                                className="w-12 text-center font-black text-indigo-700 bg-transparent outline-none p-0 border-none focus:ring-0 text-sm disabled:text-slate-300"
                                                placeholder="0"
                                            />
                                            <button disabled={p.cost === null} onClick={() => updateStock(p.id, 'stockIn', 1)} className="w-8 h-8 flex items-center justify-center bg-indigo-100 rounded-md text-indigo-700 active:bg-indigo-200 disabled:opacity-50"><Plus className="w-4 h-4" /></button>
                                        </div>
                                    </div>
                                    
                                    {/* ควบคุม ขายออก (พิมพ์ตัวเลขได้เอง) */}
                                    <div className={`bg-orange-50/50 p-2 rounded-xl border border-orange-100/50 ${p.cost === null ? 'opacity-40' : ''}`}>
                                        <p className="text-center text-[11px] text-orange-600 mb-1 font-semibold">📤 ขายออก (ชิ้น)</p>
                                        <div className="flex items-center justify-between bg-white rounded-lg p-1 border border-orange-200">
                                            <button disabled={p.cost === null} onClick={() => updateStock(p.id, 'sold', -1)} className="w-8 h-8 flex items-center justify-center bg-orange-100 rounded-md text-orange-600 active:bg-orange-200 disabled:opacity-50"><Minus className="w-4 h-4" /></button>
                                            <input 
                                                type="number" 
                                                min="0"
                                                disabled={p.cost === null}
                                                value={p.cost === null ? "" : (sOut === 0 ? "" : sOut)} 
                                                onChange={(e) => setStockValue(p.id, 'sold', e.target.value === '' ? 0 : parseInt(e.target.value, 10))}
                                                onFocus={(e) => e.target.select()}
                                                className="w-12 text-center font-black text-orange-700 bg-transparent outline-none p-0 border-none focus:ring-0 text-sm disabled:text-slate-300"
                                                placeholder="0"
                                            />
                                            <button disabled={p.cost === null} onClick={() => updateStock(p.id, 'sold', 1)} className="w-8 h-8 flex items-center justify-center bg-orange-500 rounded-md text-white active:bg-orange-600 disabled:opacity-50"><Plus className="w-4 h-4" /></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );

            // --- UI 3: POS ---
            const [cart, setCart] = useState({});
            const addToCart = (id, delta) => { setCart(prev => ({ ...prev, [id]: Math.max(0, (prev[id] || 0) + delta) })); };
            const setCartValue = (id, value) => { setCart(prev => ({ ...prev, [id]: Math.max(0, value) })); };

            const posStats = useMemo(() => {
                let total = 0;
                Object.keys(cart).forEach(id => {
                    const p = products.find(prod => prod.id === parseInt(id));
                    if(p && p.price !== null) total += p.price * cart[id];
                });
                return total;
            }, [cart, products]);

            const checkoutCart = () => {
                if(posStats === 0) return alert("กรุณาเลือกสินค้าก่อนคิดเงิน");
                if(window.confirm(`ยืนยันการขายยอดรวม ฿${formatMoney(posStats)} ใช่หรือไม่?`)) {
                    setInventory(prev => {
                        const next = { ...prev };
                        Object.keys(cart).forEach(id => {
                            if(cart[id] > 0) {
                                if (!next[id]) next[id] = { stockIn: 0, sold: 0 };
                                next[id].sold += cart[id];
                            }
                        });
                        return next;
                    });
                    alert("✅ บันทึกยอดขายสำเร็จ! ข้อมูลถูกตัดสต็อกเรียบร้อยแล้ว");
                    setCart({});
                    setActiveTab('inventory'); 
                }
            };

            const renderPOS = () => (
                <div className="pb-32 space-y-4 animate-in slide-in-from-right-4 duration-300">
                    <div className="sticky top-0 bg-slate-50 pt-2 pb-4 z-10 border-b border-slate-200">
                        <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                            <ShoppingCart className="w-5 h-5 text-emerald-600" /> เครื่องคิดเงิน (POS)
                        </h2>
                        <p className="text-xs text-slate-500 mt-1">แตะเพื่อหยิบ และกรอกพิมพ์ตัวเลขปริมาณในแต่ละช่องได้ทันที</p>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                        {products.map(p => {
                            const qty = cart[p.id] || 0;
                            // สินค้าชิ้นไหนงดจำหน่าย (price: null) ไม่แสดงในหน้า POS
                            if (p.price === null) return null;
                            
                            return (
                                <div key={p.id} className={`p-3 rounded-2xl border cursor-pointer transition-all ${qty > 0 ? 'bg-emerald-50 border-emerald-500 shadow-md' : 'bg-white border-slate-200 shadow-sm'}`} onClick={() => qty === 0 && addToCart(p.id, 1)}>
                                    <div className="text-[10px] text-slate-500 mb-1 line-clamp-1">{p.category}</div>
                                    <div className="font-bold text-slate-800 text-sm leading-tight h-10">{p.name}</div>
                                    <div className="text-emerald-600 font-black mb-2 mt-1">฿{formatMoney(p.price)}</div>
                                    {qty > 0 ? (
                                        <div className="flex items-center justify-between bg-white rounded-lg border border-emerald-200 p-1" onClick={(e) => e.stopPropagation()}>
                                            <button onClick={(e) => { e.stopPropagation(); addToCart(p.id, -1); }} className="w-8 h-8 bg-slate-100 rounded text-slate-600 flex items-center justify-center"><Minus className="w-4 h-4"/></button>
                                            <input 
                                                type="number" 
                                                min="0"
                                                value={qty === 0 ? "" : qty} 
                                                onChange={(e) => setCartValue(p.id, e.target.value === '' ? 0 : parseInt(e.target.value, 10))}
                                                onFocus={(e) => e.target.select()}
                                                className="w-12 text-center font-black text-emerald-700 bg-transparent outline-none p-0 border-none focus:ring-0 text-sm"
                                                placeholder="0"
                                            />
                                            <button onClick={(e) => { e.stopPropagation(); addToCart(p.id, 1); }} className="w-8 h-8 bg-emerald-500 rounded text-white flex items-center justify-center"><Plus className="w-4 h-4"/></button>
                                        </div>
                                    ) : (
                                        <div className="w-full text-center py-1.5 bg-slate-100 text-slate-500 text-xs font-bold rounded-lg uppercase tracking-wider">แตะเพื่อหยิบ</div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    {posStats > 0 && (
                        <div className="fixed bottom-[72px] left-0 w-full p-4 z-40 animate-in slide-in-from-bottom-8">
                            <div className="max-w-md mx-auto bg-slate-800 text-white rounded-2xl p-4 shadow-xl flex items-center justify-between">
                                <div>
                                    <p className="text-slate-400 text-xs font-semibold uppercase tracking-wide mb-1">ยอดรวมต้องชำระ</p>
                                    <p className="text-2xl font-black text-emerald-400">฿{formatMoney(posStats)}</p>
                                </div>
                                <button onClick={checkoutCart} className="bg-emerald-500 hover:bg-emerald-400 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg active:scale-95 transition-all">
                                    <ShoppingCart className="w-5 h-5" /> คิดเงิน
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 font-sans sm:bg-slate-200 sm:py-8 flex justify-center w-full">
                    <div className="w-full sm:max-w-md bg-slate-50 min-h-screen sm:min-h-[800px] sm:shadow-2xl sm:rounded-[3rem] relative overflow-hidden flex flex-col sm:border-x-4 sm:border-t-4 sm:border-b-[12px] sm:border-slate-900">
                        
                        <div className="h-6 w-full bg-slate-50 justify-center items-end hidden sm:flex pt-2 z-50 absolute top-0">
                            <div className="w-1/3 h-5 bg-slate-900 rounded-b-xl"></div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-5 pt-8 sm:pt-10 custom-scrollbar relative">
                            {activeTab === 'home' && renderHome()}
                            {activeTab === 'inventory' && renderInventory()}
                            {activeTab === 'pos' && renderPOS()}
                        </div>

                        <div className="bg-white border-t border-slate-200 flex justify-around items-center p-3 pb-safe z-50 absolute bottom-0 w-full sm:rounded-b-[2.5rem] no-select">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${activeTab === 'home' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Home className="w-6 h-6" />
                                <span className="text-[10px] font-bold">สรุปผล</span>
                            </button>
                            <button onClick={() => setActiveTab('inventory')} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${activeTab === 'inventory' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Package className="w-6 h-6" />
                                <span className="text-[10px] font-bold">สต็อก</span>
                            </button>
                            <button onClick={() => setActiveTab('pos')} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${activeTab === 'pos' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <ShoppingCart className="w-6 h-6" />
                                <span className="text-[10px] font-bold">คิดเงิน</span>
                            </button>
                        </div>

                        {aiModal.isOpen && (
                            <div className="absolute inset-0 z-[60] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="bg-white w-full rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[80%]">
                                    <div className="bg-gradient-to-r from-fuchsia-100 to-indigo-100 p-4 border-b border-indigo-50 flex items-center justify-between shrink-0">
                                        <h3 className="font-bold text-indigo-900 flex items-center gap-2">
                                            <Bot className="w-5 h-5 text-indigo-600" />
                                            {aiModal.title}
                                        </h3>
                                        <button onClick={() => setAiModal({ ...aiModal, isOpen: false })} className="p-1 bg-white/50 hover:bg-white rounded-full text-slate-500 transition-colors">
                                            <X className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <div className="p-5 overflow-y-auto flex-1 custom-scrollbar bg-slate-50">
                                        {aiModal.isLoading ? (
                                            <div className="flex flex-col items-center justify-center py-10 text-indigo-500 space-y-3">
                                                <Loader2 className="w-8 h-8 animate-spin" />
                                                <p className="text-sm font-semibold animate-pulse">AI กำลังใช้ความคิดประมวลผล...</p>
                                            </div>
                                        ) : (
                                            <div className="text-sm text-slate-700 leading-relaxed whitespace-pre-line">
                                                {aiModal.content}
                                            </div>
                                        )}
                                    </div>
                                    {!aiModal.isLoading && aiModal.content && (
                                        <div className="p-4 border-t border-slate-100 bg-white shrink-0 flex justify-end no-select">
                                            <button onClick={copyToClipboard} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all active:scale-95 w-full justify-center">
                                                {isCopied ? <Check className="w-4 h-4" /> : <CopyIcon className="w-4 h-4" />}
                                                {isCopied ? "คัดลอกข้อความแล้ว!" : "คัดลอกข้อความ"}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
